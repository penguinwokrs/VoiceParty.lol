name = "voicecrew"

compatibility_date = "2024-04-01"
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "VC_SESSIONS"
id = "74421f4d32f648e4b6ad64a9ef5498ee"
preview_id = "bfac51e6cf5e4e4388609f68c70f8c5d"

# D1 holds two unrelated things, both queried by key:
#   - `reports`: permanent, plaintext PII (see docs/moderation.md, privacy policy)
#   - `funnel_stats`: identifier-free aggregate counters (see docs/analytics.md)
# They share this database only to avoid provisioning a second one; the funnel
# table carries no PII, so it does not widen the reports table's exposure.
# (Funnel metrics were prototyped on Analytics Engine but AE is not in the
# Workers Free plan and broke the Pages deploy — hence D1 counters instead.)
[[d1_databases]]
binding = "VC_DB"
database_name = "voicecrew-reports"
database_id = "0b49755f-8c3a-477d-93a6-47ff1fe0cd13"
migrations_dir = "migrations"

# Temporary: Riot API validation is disabled while awaiting RSO production
# approval (~1 month lead time). The RSO/validation code is kept intact.
# Set to "true" or remove this to re-enable validation.
[vars]
RIOT_VALIDATION_ENABLED = "false"

# Emergency switch for moderation. Uncomment to stop reports from issuing
# automatic 24h bans; reports are still recorded and the reporter's client still
# mutes locally. See docs/moderation.md §1.5.
# MODERATION_AUTO_BAN_ENABLED = "false"
