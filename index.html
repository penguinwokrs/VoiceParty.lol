<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary meta -->
  <title>Voice Party — Real-time browser voice chat for your team</title>
  <meta name="description"
    content="Voice Party is a free, browser-based real-time voice chat for gaming teams. No install, no sign-up — share a link and talk with crystal-clear voice. Available in English, 日本語, and 한국어." />
  <meta name="keywords"
    content="voice chat, browser voice chat, team voice chat, real-time voice, gaming voice chat, free voice chat, no install voice chat" />
  <meta name="author" content="Voice Party" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <meta name="theme-color" content="#0A1428" />
  <link rel="canonical" href="https://voiceparty.lol/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Voice Party" />
  <meta property="og:title" content="Voice Party — Real-time browser voice chat for your team" />
  <meta property="og:description"
    content="Free, browser-based real-time voice chat for gaming teams. No install, no sign-up — share a link and talk with crystal-clear voice." />
  <meta property="og:url" content="https://voiceparty.lol/" />
  <meta property="og:image" content="https://voiceparty.lol/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Voice Party — real-time browser voice chat" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:locale:alternate" content="ja_JP" />
  <meta property="og:locale:alternate" content="ko_KR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Voice Party — Real-time browser voice chat for your team" />
  <meta name="twitter:description"
    content="Free, browser-based real-time voice chat for gaming teams. No install, no sign-up — share a link and talk." />
  <meta name="twitter:image" content="https://voiceparty.lol/og-image.png" />
  <meta name="twitter:image:alt" content="Voice Party — real-time browser voice chat" />

  <!-- Web app manifest -->
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Structured data: the application itself -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Voice Party",
    "url": "https://voiceparty.lol/",
    "description": "Free, browser-based real-time voice chat for gaming teams. No install, no sign-up — share a link and talk with crystal-clear voice.",
    "applicationCategory": "CommunicationApplication",
    "operatingSystem": "Any (modern web browser)",
    "browserRequirements": "Requires JavaScript and a WebRTC-capable browser",
    "inLanguage": ["en", "ja", "ko"],
    "isAccessibleForFree": true,
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <!-- Structured data: how to use (mirrors the on-site 4-step guide) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "HowTo",
    "name": "How to use Voice Party",
    "description": "Start a real-time voice chat with your team in four steps, right in your browser.",
    "totalTime": "PT1M",
    "step": [
      {
        "@type": "HowToStep",
        "position": 1,
        "name": "Enter your name and game ID",
        "text": "Open Voice Party, then enter your name and a game ID that works as a shared passphrase. Any ID is fine as long as your team uses the same one."
      },
      {
        "@type": "HowToStep",
        "position": 2,
        "name": "Connect to voice chat",
        "text": "Join the game to enable your microphone and connect with everyone on the same game ID."
      },
      {
        "@type": "HowToStep",
        "position": 3,
        "name": "Share the URL with your team",
        "text": "Send your browser URL to teammates. Whoever opens the link joins the same voice room."
      },
      {
        "@type": "HowToStep",
        "position": 4,
        "name": "Talk and coordinate",
        "text": "Coordinate with crystal-clear voice. Leave the room anytime with one click."
      }
    ]
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
